{% extends 'base.html' %}

{% block page_title %}પ્રોફાઇલ{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-person-circle"></i> મારી પ્રોફાઇલ</h5>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-12 text-center">
                        <i class="bi bi-person-circle" style="font-size: 5rem; color: #28a745;"></i>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-12">
                        <table class="table table-borderless">
                            <tr>
                                <td><strong>નામ:</strong></td>
                                <td>{{ user.name }}</td>
                            </tr>
                            <tr>
                                <td><strong>મોબાઇલ નંબર:</strong></td>
                                <td>{{ user.mobile }}</td>
                            </tr>
                            <tr>
                                <td><strong>ગામ:</strong></td>
                                <td>{{ user.village }}</td>
                            </tr>
                            <tr>
                                <td><strong>નોંધણી તારીખ:</strong></td>
                                <td>{{ user.date_joined|date:"d/m/Y" }}</td>
                            </tr>
                        </table>
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{% url 'dashboard' %}" class="btn btn-primary">
                        <i class="bi bi-house-door"></i> ડેશબોર્ડ પર જાઓ
                    </a>
                    <a href="{% url 'logout' %}" class="btn btn-danger">
                        <i class="bi bi-box-arrow-right"></i> લોગઆઉટ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
