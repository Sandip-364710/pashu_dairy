{% load static %}
<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>એકાઉન્ટ બનાવો - ડેરી મેનેજમેન્ટ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100vh; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #0a0e12 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* મેઈન કાર્ડ ડિઝાઇન */
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-header h2 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.6rem;
            text-align: center;
        }

        .auth-header p {
            color: #8899a6;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* ઇનપુટ બોક્સ */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #5c6d7e;
            font-size: 1.1rem;
        }

        .custom-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        .custom-input:focus {
            border-color: #3498db;
            background: rgba(0, 0, 0, 0.4);
        }

        /* બટન ડિઝાઇન */
        .btn-primary-custom {
            width: 100%;
            padding: 14px;
            background: #3498db;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-primary-custom:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            color: #8899a6;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>રજીસ્ટ્રેશન 🐄</h2>
            <p>નવું એકાઉન્ટ બનાવવા માટે માહિતી આપો</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <i class="bi bi-person"></i>
                <input type="text" name="name" class="custom-input" placeholder="તમારું નામ" required>
            </div>

            <div class="form-group">
                <i class="bi bi-phone"></i>
                <input type="tel" name="mobile" class="custom-input" placeholder="મોબાઈલ નંબર" maxlength="10" required>
            </div>

            <div class="form-group">
                <i class="bi bi-geo-alt"></i>
                <input type="text" name="village" class="custom-input" placeholder="ગામનું નામ" required>
            </div>

            <div class="form-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password1" class="custom-input" placeholder="પાસવર્ડ સેટ કરો" required>
            </div>
            <div class="form-group">
            <i class="bi bi-shield-check"></i>
            <input type="password" name="password2" class="custom-input" placeholder="પાસવર્ડ ફરીથી લખો" required>
        </div>

            <button type="submit" class="btn-primary-custom">એકાઉન્ટ બનાવો</button>
        </form>

        <div class="auth-footer">
            પહેલેથી ખાતું છે? <a href="{% url 'login' %}">લોગિન કરો</a>
        </div>
    </div>

</body>
</html>
