<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>લોગિન - મારું પશુધન</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100vh; 
            width: 100vw;
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #0a0e12 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            color: #fff;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .auth-header p {
            color: #8899a6;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #5c6d7e;
            font-size: 1.1rem;
            z-index: 5;
        }

        /* ઇનપુટ ફિલ્ડ ડિઝાઇન */
        .custom-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff !important;
            outline: none;
            transition: 0.3s;
        }

        .custom-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }

        /* પ્લેસહોલ્ડરનો કલર સેટ કરવા માટે */
        .custom-input::placeholder {
            color: #5c6d7e;
            opacity: 1;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #3498db;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .auth-footer {
            margin-top: 25px;
            text-align: center;
            color: #8899a6;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-header">
            <h2>મારું પશુધન 🐄</h2>
            <p>પશુ મેનેજમેન્ટ હવે તમારી આંગળીના ટેરવે</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <i class="bi bi-phone"></i>
                <input type="tel" name="mobile" class="custom-input" placeholder="મોબાઈલ નંબર" required>
            </div>
            
            <div class="form-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="custom-input" placeholder="પાસવર્ડ" required>
            </div>
            
            <button type="submit" class="btn-login">લોગિન</button>
        </form>
        
        <div class="auth-footer">
            નવા પશુપાલક? <a href="{% url 'register' %}">અહીં નોંધણી કરો</a>
        </div>
    </div>

</body>
</html>
